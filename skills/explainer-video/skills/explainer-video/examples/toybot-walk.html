<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Toybot takes a walk</title>
<style>
  /* Overlay text lives in the DOM, not the canvas: it stays crisp in screenshots
     and restyles without touching the scene. Colors/fonts come from CONFIG below. */
  html,body{margin:0;padding:0;overflow:hidden;background:#0e0b14;width:100%;height:100%;}
  #c{display:block;width:100vw;height:100vh;}
  #cap{position:fixed;left:50%;bottom:5.5%;transform:translateX(-50%);
    font:600 30px/1.3 "Avenir Next","Segoe UI",system-ui,sans-serif;
    color:#fff;background:rgba(20,14,30,.62);padding:14px 34px;border-radius:999px;
    white-space:nowrap;opacity:0;border:1px solid rgba(255,255,255,.18);
    text-shadow:0 2px 8px rgba(0,0,0,.5);}
  #title{position:fixed;left:50%;top:7%;transform:translateX(-50%);text-align:center;
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;color:#fff;opacity:0;}
  #title h1{font-size:44px;margin:0;font-weight:800;text-shadow:0 3px 14px rgba(0,0,0,.55);}
  #title p{font-size:24px;margin:6px 0 0;font-weight:500;opacity:.9;}
  /* will-change pins these as compositor layers. Without it Chrome re-rasterizes
     the text with a different AA mode after opacity round-trips through 0, so the
     same t can differ by a few pixels depending on seek ORDER -- which breaks the
     frames-shot-in-any-order guarantee for any frame containing overlay text. */
  #cap,#title{will-change:opacity;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;}
  #vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(10,6,18,.42) 100%);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="title"><h1></h1><p></p></div>
<div id="cap"></div>
<div id="flash"></div>
<!-- three is vendored locally, never loaded from a CDN: `bun run build.js vendor`
     writes three.global.js beside the scene (a single self-contained bundle that
     sets window.THREE). It MUST stay a classic script, not type="module" —
     Chrome CORS-blocks ES module imports over file://, and opening the scene
     directly from disk is the whole point. `build.js bundle` inlines this file. -->
<script src="./three.global.js"></script>
<script>
"use strict";
/* ============================================================
   CONTRACT (do not rename): window.seekTo(t), window.DURATION,
   window.stopPlayback(), window.sceneReady.
   Everything on screen is a pure function of t — no Math.random(),
   no Date.now(), no accumulated state. That is what makes the
   HTML loop and the MP4 render provably identical.
   ============================================================ */

/* ============================================================
   BEATS — the single source of timing truth. Durations, not
   absolute times: they accumulate, so lengthening one beat
   shifts every later beat instead of silently overlapping it.
   That is what makes retiming genuinely a one-line edit.

   NOTHING else in this file may contain a literal timestamp.
   Camera keyframes, captions and `duration` all derive from
   here, and animate() addresses beats by NAME via ramp()/pulse().
   ============================================================ */
const BEATS = [
  {name:'title',  dur:2.4},
  {name:'arrive', dur:4.2, cap:"Two-bone IK — feet that actually plant"},
  {name:'rack',   dur:3.6, cap:"Rack focus — a real depth of field"},
  {name:'spark',  dur:3.4, cap:"Bloom, budgeted to the payoff"},
];

/* ---------- STYLE: everything that is the LOOK. ---------- */
const STYLE = {
  bg: 0xdfe6ea,                       // soft daylight
  floor: 0xe7dcc8,                    // warm sand
  exposure: 1.0,                      // if the scene looks washed out, LOWER this first
  ink: 0x26221c,                      // outline + dark details
  body: 0x2a9d8f, accent: 0xe05d3d, trim: 0xe9b44c,   // the plugin palette, in 3D
  toonSteps: 3,                       // cel bands in the gradient map
  outline: 1.055,                     // inverted-hull scale — the cel linework
  post: {                             // per-frame-pure passes ONLY (no temporal)
    bloomStrength:.55, bloomRadius:.3, bloomThreshold:.82,
    aperture:.00032, maxblur:.006,    // focus itself is animated in animate()
  },
};

/* ---------- CONFIG: everything that is neither timing nor look. ---------- */
const CONFIG = {
  title: "Toybot takes a walk",
  subtitle: "cel shading · analytic IK · rack focus · bloom",
  flashes: [],                        // world-cut flashes, as {beat, at} — e.g. [{beat:'two', at:0}]
  seed: 20260721,                     // change to reshuffle all seeded randomness
  sway: 0.04,                         // idle camera drift. Set to 0 for `build.js loop`:
                                      // sway moves every pixel every frame, which defeats
                                      // WebP/GIF inter-frame compression and can 10x the
                                      // file size. Free in mp4, expensive inline.
  capFade: 0.35,                      // caption fade inset from each beat edge, seconds
  energy: 'steadicam',                // camera nerves: 'locked' | 'steadicam' | 'handheld'
};

/* ==== KERNEL-START ====================================================
   The shared kit. This block is byte-identical in every scene template —
   smoke.js FAILS the run if two checked files carry different kernels.
   Edit it in ALL templates or in none; it is the seed of a future
   extracted kernel file, kept inline so scenes stay single-file.
   ======================================================================= */
/* ---------- deterministic kit ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rng=mulberry32(CONFIG.seed);
const R=[];for(let i=0;i<4000;i++)R.push(rng());     // frozen random pool — index it, never re-draw
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,u)=>a+(b-a)*u;
// Zero-width span would be 0/0 -> NaN, which propagates silently into a
// position (mesh vanishes) or an opacity string. Guard rather than poison.
const ss=(t,t0,t1)=>{if(t1===t0)return t>=t0?1:0;const u=clamp((t-t0)/(t1-t0),0,1);return u*u*(3-2*u);};   // smooth 0→1
// bump() is rise-AND-FALL: it is 0 at BOTH ends and peaks in the middle. Correct
// for "flash and go"; wrong for "grow and stay" — a burst scaled by bump(u,0,1)
// shrinks back to nothing exactly when it should be at full size, which shipped
// once. Use ss() when the effect should arrive and remain.
const bump=(t,t0,t1)=>{if(t1===t0)return 0;const u=clamp((t-t0)/(t1-t0),0,1);return Math.sin(u*Math.PI);}; // rise+fall

/* ---------- easing personalities (still pure functions) ----------
   ss() is the neutral register. These are the other temperaments a style can
   speak in — all closed forms, all safe anywhere a 0..1 u is in hand:
   compose them with the beat addressing below, e.g. backOut(ramp(t,'one',0,.4)).
   backOut(u)    : arrives with ~10% overshoot, then settles. Snappy, cartoonish.
   elasticOut(u) : overshoots and rings down. Bigger personality than backOut —
                   budget it for payoffs; EVERY arrival ringing reads as jelly.
   quant(t,n)    : stop-motion. Quantize TIME before deriving a pose (n poses
                   per second) and motion reads hand-made. Still deterministic —
                   the quantized t is a pure function of t. Quantize per-object,
                   never inside seekTo itself.
   noise1(t,f,k) : seeded 1-D value noise in [-0.5,0.5] at frequency f Hz, from
                   the frozen R pool. Same k = same track, different k =
                   independent track. Handheld/idle wobble; keep amplitudes small.
   GATE ON THE RAW RAMP u, NEVER ON AN EASED VALUE: backOut(0) carries positive
   floating-point residue (~2e-16), so `if(eased<=0)` leaks one frame where
   scaled geometry is invisible but anything unscaled beside it renders. */
const backOut=(u,s=1.70158)=>{u=clamp(u,0,1);const v=u-1;return 1+(s+1)*v*v*v+s*v*v;};
const elasticOut=(u,p=.3)=>{u=clamp(u,0,1);return u===0||u===1?u:Math.pow(2,-10*u)*Math.sin((u-p/4)*(2*Math.PI)/p)+1;};
const quant=(t,n)=>Math.floor(t*n)/n;
const noise1=(t,f=1,k=0)=>{const x=t*f,i=Math.floor(x),u=x-i,
  g=j=>R[((j%R.length)+R.length)%R.length]-.5,s=u*u*(3-2*u);
  return g(i+k*997)+(g(i+1+k*997)-g(i+k*997))*s;};

/* ---------- beat addressing (use these, never raw timestamps) ----------
   Resolve durations into absolute spans once, then address them by name.
   The a/b arguments are FRACTIONS of the beat, not seconds, so an effect
   keeps its place when the beat is retimed — which is also what lets
   narration-driven timing rewrite durations without breaking animate(). */
const BEAT={};{let acc=0;for(const b of BEATS){BEAT[b.name]={...b,t0:acc,t1:acc+b.dur};acc+=b.dur;}}
const TOTAL=BEATS.reduce((s,b)=>s+b.dur,0);
function beat(name){const B=BEAT[name];if(!B)throw new Error('unknown beat: '+name);return B;}
function span(name,a=0,b=1){const B=beat(name);return[B.t0+a*B.dur,B.t0+b*B.dur];}
const ramp =(t,name,a=0,b=1)=>{const[x,y]=span(name,a,b);return ss(t,x,y);};    // 0→1 ramp
const pulse=(t,name,a=0,b=1)=>{const[x,y]=span(name,a,b);return bump(t,x,y);};  // rise+fall
// during() is a hard boolean at the beat edges, so any expression gated by it MUST be zero at both edges
// or it steps discontinuously in one frame and reads as a pop. Safe use: toggling .visible on something
// with scale already reaching 0. Adding a nonzero offset to a rotation inside if(during(...)) is the exact
// shape that produced a visible 20-degree arm snap in a real scene. Reach for ramp() or pulse() first.
const during=(t,name)=>t>=beat(name).t0&&t<beat(name).t1;
const beatAt=(name,at=0)=>span(name,at,at)[0];                                  // absolute t

/* Seconds-from-beat-start variants. Use these when a duration is PHYSICAL and
   must not stretch when the beat is retimed: a 0.25s flash, a 0.06s world cut,
   a fixed settle time. Stretching a cut window with its beat would uncover the
   cut — which is the one bug method.md says already cost a re-render. Fractions
   for "across this part of the beat", seconds for "this many seconds". */
const secAt  =(name,s=0)=>beat(name).t0+s;
const rampS  =(t,name,s0,s1)=>ss(t,secAt(name,s0),secAt(name,s1));
const pulseS =(t,name,s0,s1)=>bump(t,secAt(name,s0),secAt(name,s1));
/* ==== KERNEL-END ==== */

/* ---------- renderer ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(1);                            // fixed DPR = identical pixels everywhere
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFShadowMap;   // PCFSoft deprecated in r185
renderer.outputColorSpace=THREE.SRGBColorSpace;   // r152+ name; outputEncoding is gone
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=STYLE.exposure;
const scene=new THREE.Scene();
scene.background=new THREE.Color(STYLE.bg);
scene.fog=new THREE.Fog(STYLE.bg,26,90);
const camera=new THREE.PerspectiveCamera(42,16/9,.1,300);

/* ---------- sky + IBL: measured, and deliberately NOT in this film ----------
   Both were built and bisected here, and both are recorded in style-3d.md:
   - PMREMGenerator.fromScene left every subsequent frame BLACK on SwiftShader
     (software GL, the dev-container case), confirmed against a no-PMREM
     control. Standard recipe, expected to work on hardware GL; unverified
     there. The chrome pod below reads convincingly from the directional rig
     alone, which is why the film does not miss it.
   - The visible Sky dome WORKS but is HDR-bright: on this film's low-horizon
     composition it put a blinding band across every frame and fought ACES at
     any exposure. Judged against the flat-background control, the control
     won. Sky suits open-sky compositions with high camera angles — it stays
     bundled (THREE.Sky) for films shaped like that. */

/* ---------- post chain: per-frame pure, so seekTo stays byte-deterministic.
   RenderPass -> Bokeh (DoF) -> Bloom -> OutputPass (tone map + sRGB).
   NEVER add temporal passes (TAA, accumulation blur): they carry state across
   frames and break the HTML/MP4 parity this whole architecture exists for.
   smoke.js's byte-identity check is the enforcement. ---------- */
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bokeh=new THREE.BokehPass(scene,camera,{focus:12,aperture:STYLE.post.aperture,maxblur:STYLE.post.maxblur});
composer.addPass(bokeh);
composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),
  STYLE.post.bloomStrength,STYLE.post.bloomRadius,STYLE.post.bloomThreshold));
composer.addPass(new THREE.OutputPass());

function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);composer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();

/* ---------- shared helpers ---------- */
const S=(r,w=24,h=16)=>new THREE.SphereGeometry(r,w,h);
const B=(x,y,z)=>new THREE.BoxGeometry(x,y,z);
const C=(rt,rb,h,s=20)=>new THREE.CylinderGeometry(rt,rb,h,s);
function mesh(g,m,parent,px=0,py=0,pz=0){const o=new THREE.Mesh(g,m);o.position.set(px,py,pz);o.castShadow=true;o.receiveShadow=true;if(parent)parent.add(o);return o;}

/* ---------- cel kit: stepped gradient map + inverted-hull outlines ----------
   MeshToonMaterial + a NearestFilter gradient map gives the banded light;
   the linework is a BackSide black shell 4.5% larger, ADDED AS A CHILD so it
   rides every pivot the IK moves. Emissive-driven bloom passes through the
   toon bands untouched, which is why the threshold sits above the palette. */
const GRAD=(()=>{const n=STYLE.toonSteps,d=new Uint8Array(n);
  for(let i=0;i<n;i++)d[i]=Math.round(90+165*i/(n-1));
  const t=new THREE.DataTexture(d,n,1,THREE.RedFormat);
  t.minFilter=t.magFilter=THREE.NearestFilter;t.needsUpdate=true;return t;})();
const toon=(color,opts={})=>new THREE.MeshToonMaterial(Object.assign({color,gradientMap:GRAD},opts));
const OUTLINE_MAT=new THREE.MeshBasicMaterial({color:STYLE.ink,side:THREE.BackSide});
function om(g,m,parent,px,py,pz){                 // outlined mesh
  const o=mesh(g,m,parent,px,py,pz);
  const s=new THREE.Mesh(g,OUTLINE_MAT);s.scale.setScalar(STYLE.outline);
  s.castShadow=false;s.receiveShadow=false;o.add(s);
  return o;
}

/* ---------- lights (toon reads them as bands) ---------- */
// Hemisphere stays LOW: toon quantizes directional light into bands, but
// hemisphere irradiance is smooth and washes the cel look out on top.
// Hemisphere stays LOW: toon quantizes directional light into bands, but
// hemisphere irradiance is smooth and washes the cel look out on top.
scene.add(new THREE.HemisphereLight(0xdfeaf2,0xcbb89a,.45));
const key=new THREE.DirectionalLight(0xfff2dc,1.45);
key.position.set(7,11,7);key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-16;key.shadow.camera.right=16;key.shadow.camera.top=16;key.shadow.camera.bottom=-16;
scene.add(key);
const rim=new THREE.DirectionalLight(0xbfd8ff,.8);rim.position.set(-6,7,-8);scene.add(rim);

/* ============================================================
   WORLD — the bot, its ground, and one prop to rack focus onto.
   ============================================================ */
const world=new THREE.Group();scene.add(world);
const floor=mesh(new THREE.PlaneGeometry(200,200),toon(STYLE.floor),world);
floor.rotation.x=-Math.PI/2;floor.castShadow=false;

// the prop: a little signpost near the lens — the OTHER subject of the rack
const prop=new THREE.Group();world.add(prop);prop.position.set(4.0,0,3.6);
om(C(.09,.12,2.6),toon(STYLE.ink),prop,0,1.3,0);
om(B(1.25,.85,.14),toon(STYLE.accent),prop,.45,2.45,0);

/* ---------- world dressing: the three remaining material families ----------
   Forest: InstancedMesh, seeded from R[] — one draw call per geometry, with a
   matching BackSide instanced shell so the outlines are one draw call too.
   Urn: LatheGeometry, toon — curves without an asset file.
   Pod: MeshPhysicalMaterial reading scene.environment — the IBL proof.
   Boulder: MeshMatcapMaterial with a matcap PAINTED at load on a canvas —
   sculpted-clay shading with zero lights and zero files. ---------- */
{
  const coneG=new THREE.ConeGeometry(1,1,7),trunkG=new THREE.CylinderGeometry(.16,.2,1,6);
  const treeM=toon(0x37806b),trunkM=toon(0x6b4a32);
  const N=46,tree=new THREE.InstancedMesh(coneG,treeM,N),trunk=new THREE.InstancedMesh(trunkG,trunkM,N);
  const treeO=new THREE.InstancedMesh(coneG,OUTLINE_MAT,N);
  const M=new THREE.Matrix4(),Q=new THREE.Quaternion(),V=new THREE.Vector3(),P=new THREE.Vector3();
  for(let i=0;i<N;i++){
    const x=-60+120*R[i*3],z=-9-40*R[i*3+1],h=2.2+3.4*R[i*3+2];
    P.set(x,h/2+.7,z);V.set(h*.42,h,h*.42);
    M.compose(P,Q,V);tree.setMatrixAt(i,M);
    M.compose(P,Q,V.clone().multiplyScalar(1.06));treeO.setMatrixAt(i,M);
    M.compose(new THREE.Vector3(x,.35,z),Q,new THREE.Vector3(1,1,1));trunk.setMatrixAt(i,M);
  }
  tree.castShadow=trunk.castShadow=true;
  world.add(tree,treeO,trunk);
}
om(new THREE.LatheGeometry(
  [[0,0],[.62,.06],[.5,.5],[.3,.9],[.34,1.28],[.52,1.5],[.44,1.62]].map(p=>new THREE.Vector2(p[0],p[1])),18),
  toon(STYLE.trim),world,-6.5,0,-3.5);
{
  const pod=new THREE.Mesh(S(.7,28,20),new THREE.MeshPhysicalMaterial(
    {color:0xf2f4f6,metalness:1,roughness:.12,clearcoat:1}));
  pod.position.set(-9,.7,4.2);pod.castShadow=true;world.add(pod);
}
{
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const c=cv.getContext('2d');
  const g=c.createRadialGradient(96,84,18,128,128,132);
  g.addColorStop(0,'#f6e0c8');g.addColorStop(.55,'#c76b4a');g.addColorStop(1,'#2a1409');
  c.fillStyle=g;c.fillRect(0,0,256,256);
  const mc=new THREE.CanvasTexture(cv);mc.colorSpace=THREE.SRGBColorSpace;
  const rock=mesh(S(1.1,18,14),new THREE.MeshMatcapMaterial({matcap:mc}),world,10.5,.62,-4.5);
  rock.scale.set(1.35,.72,1.05);rock.rotation.y=.7;
}

// ---- the bot: every joint is a Group, so outlines and IK ride together ----
const L1=1.7,L2=1.7,HIP=3.5,STRIDE=2.6;
const bot=new THREE.Group();world.add(bot);
const torso=new THREE.Group();bot.add(torso);torso.position.y=HIP;
om(B(2.2,2.5,1.4),toon(STYLE.body),torso,0,1.25,0);
om(B(2.4,.5,1.55),toon(STYLE.trim),torso,0,.15,0);            // belt
const head=new THREE.Group();torso.add(head);head.position.y=3.3;   // clear of the torso: the outline shell shows any seam
om(S(1.05),toon(STYLE.body),head,0,.35,0);
// eyes: small emissives — the bloom budget lives here and on the orb
const eyeMat=new THREE.MeshBasicMaterial({color:0xbfe9ff});
mesh(S(.16,10,8),eyeMat,head,.42,.5,.88).castShadow=false;
mesh(S(.16,10,8),eyeMat,head,-.42,.5,.88).castShadow=false;
const ant=new THREE.Group();head.add(ant);ant.position.y=1.35;
om(C(.05,.05,.9),toon(STYLE.ink),ant,0,.45,0);
const orbMat=new THREE.MeshStandardMaterial({color:STYLE.trim,emissive:STYLE.trim,emissiveIntensity:.25,roughness:.4});
const orb=mesh(S(.34,18,12),orbMat,ant,0,1.05,0);orb.castShadow=false;

function arm(side){const a=new THREE.Group();torso.add(a);a.position.set(side*1.35,2.0,0);
  om(C(.22,.18,1.9),toon(STYLE.body),a,0,-.95,0);
  om(S(.3),toon(STYLE.accent),a,0,-2.0,0);return a;}
const armL=arm(1),armR=arm(-1);

// leg: hip Group -> thigh (pivot at top) -> knee Group -> shin -> flat foot.
// Geometries are pre-translated so each pivot rotates about the JOINT.
function leg(side){
  const hip=new THREE.Group();bot.add(hip);hip.position.set(0,HIP,side*.62);
  const tg=C(.3,.24,L1);tg.translate(0,-L1/2,0);
  om(tg,toon(STYLE.body),hip,0,0,0);
  const knee=new THREE.Group();hip.add(knee);knee.position.y=-L1;
  const sg=C(.22,.18,L2);sg.translate(0,-L2/2,0);
  om(sg,toon(STYLE.body),knee,0,0,0);
  const ankle=new THREE.Group();knee.add(ankle);ankle.position.y=-L2;
  const fg=B(1.15,.38,.7);fg.translate(.22,-.19,0);
  om(fg,toon(STYLE.accent),ankle,0,0,0);
  return {hip,knee,ankle};
}
const legL=leg(1),legR=leg(-1);

/* Analytic two-bone IK in the sagittal (x-up) plane — closed form, no solver,
   no state. Given the foot target relative to the hip, law of cosines gives
   the knee; the foot counter-rotates to stay flat. Pure function of its
   inputs, so seekTo purity is untouched. */
function solveLeg(l,dx,dy){
  const d=clamp(Math.hypot(dx,dy),.2,L1+L2-.01);
  const phi=Math.atan2(dx,-dy);
  const a=Math.acos(clamp((L1*L1+d*d-L2*L2)/(2*L1*d),-1,1));
  const g=Math.acos(clamp((L1*L1+L2*L2-d*d)/(2*L1*L2),-1,1));
  l.hip.rotation.z=phi+a;
  l.knee.rotation.z=-(Math.PI-g);
  l.ankle.rotation.z=-(l.hip.rotation.z+l.knee.rotation.z);
}

/* Gait: everything derives from DISTANCE TRAVELLED s, never wall time — feet
   freeze mid-plant when the bot stops (method.md, cyclic motion). Each foot
   alternates stance/swing over a 2-stride cycle; its plant point is a pure
   function of the cycle index. */
const START=-16;                                   // where the walk begins, world x
function footTarget(s,phase){
  const cyc=s/(2*STRIDE)+phase;
  const n=Math.floor(cyc),u=cyc-n;
  // Plant grid anchored at START — anchored at the origin, dx hit +16 at the
  // first frame and the IK swung both legs horizontal. Shipped, seen, fixed.
  const x0=(n-phase)*2*STRIDE+START;
  if(u<.55)return[x0,0];                           // stance: nailed to the floor
  const w=ss(u,.55,1);                             // swing to the next plant
  return[x0+2*STRIDE*w,Math.sin(w*Math.PI)*.95];
}

/* ============================================================
   CINEMATOGRAPHY — the film re-authored as a shot list. Zero raw
   camera keyframes; the solver in the template does the framing.
   ============================================================ */
// Travel and hop as named closed forms — the SUBJECTS registry and animate()
// both derive from THESE, so the camera and the body can never disagree.
const botXAt=t=>lerp(-16,0,ramp(t,'arrive',.05,.95));
const hopAt=t=>{const u=ramp(t,'spark',.24,.52);return 1.7*Math.sin(u*Math.PI)*(u>0&&u<1?1:0);};

const SUBJECTS={
  // bot center EXCLUDES the hop: the camera tracks his travel, not his jump —
  // a tracked jump cancels itself on screen.
  bot:{pos:t=>[botXAt(t),3.9,0],h:7.8},
  sign:{pos:t=>[4.0,1.6,3.6],h:3.4},
};
// The size ladder, calibrated to the convention a cinematographer means:
// f = how many frame-heights the subject's full height spans; a = the
// vertical anchor on the subject the camera aims at. FS is full-body tight;
// MS is waist-up — the first cut of this table shipped MS at full-shot
// framing and the rack's second subject fell out of frame.
const SIZES={EWS:{f:.20,a:.5},WS:{f:.50,a:.5},FS:{f:.95,a:.5},MS:{f:1.6,a:.68},MCU:{f:2.4,a:.78},CU:{f:3.6,a:.84},ECU:{f:6,a:.88}};
const SHOTS=[
  {at:['title',0],    subject:'sign', size:'MS',  angle:-12},                            // open on the sign
  {at:['arrive',.02], subject:'bot',  size:'MS',  angle:-12, match:true},                // MATCH CUT: same framing, new subject
  {at:['arrive',.22], subject:'bot',  size:'WS',  angle:14,  cut:'blend'},               // widen into the tracking walk
  {at:['arrive',.85], subject:'bot',  size:'MS',  angle:14,  cut:'blend'},               // settle as he stops
  // The rack triplet is MS, not MCU: an MCU crops the sign out of frame, and
  // a rack to an off-screen subject explains nothing — both subjects must be
  // visible at different depths for the focus pull to read.
  {at:['rack',.08],   subject:'bot',  size:'FS', anchor:.48, elev:0, angle:21, cut:'blend'},               // bot sharp, sign near-field...
  {at:['rack',.42],   subject:'bot',  size:'FS', anchor:.48, elev:0, angle:21, focus:'sign', cut:'blend'}, // ...rack to the sign...
  {at:['rack',.78],   subject:'bot',  size:'FS', anchor:.48, elev:0, angle:21, cut:'blend'},               // ...and back
  {at:['spark',.05],  subject:'bot',  size:'WS',  angle:0, elev:12, cut:'whip'},         // WHIP wide for the payoff
].map(sh=>({...sh,t:beatAt(sh.at[0],sh.at[1])}));
SHOTS.forEach((sh,i)=>{sh.t1=i<SHOTS.length-1?SHOTS[i+1].t:TOTAL;});
SHOTS.forEach((sh,i)=>{         // the match-cut constraint — verified, not hoped
  if(!sh.match)return;
  const q=SHOTS[i-1]||{};
  const same=sh.size===q.size&&(sh.angle||0)===(q.angle||0)
    &&(sh.elev===undefined?6:sh.elev)===(q.elev===undefined?6:q.elev)
    &&(sh.fov===undefined?42:sh.fov)===(q.fov===undefined?42:q.fov)
    &&JSON.stringify(sh.anchor===undefined?null:sh.anchor)===JSON.stringify(q.anchor===undefined?null:q.anchor);
  if(!same)throw new Error('match cut into SHOTS['+i+'] breaks framing: size/angle/elev/fov must equal the previous shot');
});
const CUT_DUR={hard:0,whip:.16,blend:.8};
let shotFocus=12;               // DoF plane distance, refreshed by setCamera each frame
function solveShot(sh,t){
  const S=SUBJECTS[sh.subject];if(!S)throw new Error('unknown subject: '+sh.subject);
  const u=sh.t1>sh.t?ss(t,sh.t,sh.t1):0;               // shot progress drives push/orbit
  const A=SIZES[sh.size],B=sh.size2?SIZES[sh.size2]:A;
  if(!A||!B)throw new Error('unknown size: '+(A?sh.size2:sh.size));
  const f=lerp(A.f,B.f,u),anchor=sh.anchor!==undefined?sh.anchor:lerp(A.a,B.a,u);
  const a2=sh.angle2===undefined?(sh.angle||0):sh.angle2;
  const ang=lerp(sh.angle||0,a2,u)*Math.PI/180;
  const elev=(sh.elev===undefined?6:sh.elev)*Math.PI/180;
  const fovd=sh.fov===undefined?42:sh.fov;
  const[cx,cy,cz]=S.pos(t);
  const dist=S.h/f/(2*Math.tan(fovd*Math.PI/360));     // the framing solver: size -> distance
  const aimY=cy+(anchor-.5)*S.h;
  return{p:[cx+Math.sin(ang)*Math.cos(elev)*dist,aimY+Math.sin(elev)*dist,cz+Math.cos(ang)*Math.cos(elev)*dist],
         l:[cx,aimY,cz],fovd};
}
function focusDist(sh,t,p){const S=SUBJECTS[sh.focus||sh.subject];if(!S)throw new Error('unknown focus subject');
  const[x,y,z]=S.pos(t);return Math.hypot(p[0]-x,p[1]-y,p[2]-z);}
function setCamera(t){
  let i=0;for(let k=0;k<SHOTS.length;k++)if(t>=SHOTS[k].t)i=k;
  const cur=SHOTS[i],c=solveShot(cur,t);
  let p=c.p,l=c.l,fovd=c.fovd,fd=focusDist(cur,t,c.p);
  const cd=CUT_DUR[cur.cut||'hard'];
  if(i>0&&cd>0&&t<cur.t+cd){                            // entering: whip or dolly-morph
    const u=ss(t,cur.t,cur.t+cd),q=solveShot(SHOTS[i-1],t);
    const mix=(a,b)=>[lerp(a[0],b[0],u),lerp(a[1],b[1],u),lerp(a[2],b[2],u)];
    p=mix(q.p,p);l=mix(q.l,l);fovd=lerp(q.fovd,fovd,u);
    fd=lerp(focusDist(SHOTS[i-1],t,q.p),fd,u);          // focus blends too — the rack
  }
  /* camera energy — noise from the frozen pool, amplitude riding CONFIG.sway
     so `build.js loop`'s held-camera warning stays honest:
     locked = tripod, steadicam = the old gentle drift, handheld = nerves. */
  const E={locked:0,steadicam:1,handheld:4}[CONFIG.energy||'steadicam']*CONFIG.sway;
  const F=CONFIG.energy==='handheld'?1.9:.55;
  camera.position.set(p[0]+noise1(t,F,11)*E*2,p[1]+noise1(t,F,12)*E*1.2,p[2]);
  camera.fov=fovd;camera.updateProjectionMatrix();
  camera.lookAt(l[0]+noise1(t,F,13)*E*.8,l[1]+noise1(t,F,14)*E*.5,l[2]);
  shotFocus=fd;
}

/* ============================================================
   ANIMATE — every property a pure function of t.
   ============================================================ */
function animate(t){
  // travel: world x from -16 to 0 across 'arrive'; s = distance for the gait
  const botX=botXAt(t);
  const s=botX+16;
  const vAmp=pulse(t,'arrive',.05,.95);            // motion envelope: settles at both ends

  // the spark beat, sequenced so its two events don't fight: anticipation
  // squash -> hop -> landing squash + settle -> THEN the orb wakes. The first
  // cut ran hop and glow together and the payoff read as neither.
  const hop=hopAt(t);
  const squash=1-.13*pulse(t,'spark',.08,.24)-.10*pulse(t,'spark',.50,.66)
              +.06*(backOut(ramp(t,'spark',.58,.78))-1);
  bot.position.set(botX,hop,0);
  torso.scale.set(1/Math.sqrt(squash),squash,1/Math.sqrt(squash));
  torso.position.y=HIP+.14*Math.sin(Math.PI*s/STRIDE)*vAmp;
  torso.rotation.z=.10*vAmp;                       // lean into the walk
  head.rotation.z=-.06*vAmp+.08*Math.sin(Math.PI*s/STRIDE)*vAmp;

  // legs: foot targets in WORLD, solved relative to each hip in bot space.
  // Mid-hop the targets tuck toward the body instead of chasing the floor.
  for(const[l,ph]of[[legL,0],[legR,.5]]){
    let[fx,fy]=footTarget(s,ph);
    fx=lerp(botX+(ph?-.7:.5),fx,clamp(vAmp*2.5,0,1)); // ease to a rest stance when stopped
    fx+=(ph?-.45:.45)*clamp(hop,0,1);              // stagger the tuck so the feet read as two
    fy=fy*vAmp+hop*(ph?.85:.62);                   // back leg tucks higher — jump-pose asymmetry
    solveLeg(l,fx-botX,fy-HIP);
  }
  armL.rotation.z=.55*Math.sin(Math.PI*s/STRIDE)*vAmp;
  armR.rotation.z=-.55*Math.sin(Math.PI*s/STRIDE)*vAmp;

  // DoF follows the shot list: shotFocus is solved per frame, and the rack
  // IS shots 5-7 — two framings differing only in `focus`, joined by blends.
  bokeh.uniforms.focus.value=shotFocus;

  // bloom payoff: the orb wakes for the finale (park is deliberate — the film
  // ends on it), plus a proud little spin. Restated every frame, never +=.
  orbMat.emissiveIntensity=.25+5.2*ramp(t,'spark',.60,.76);
  orb.scale.setScalar(1+.18*pulse(t,'spark',.60,.85));
  head.rotation.y=.6*Math.sin(2*Math.PI*ramp(t,'spark',.78,.98));
}

/* ---------- overlay (captions, title, flashes) ---------- */
const capEl=document.getElementById('cap');
const titleEl=document.getElementById('title');
titleEl.querySelector('h1').textContent=CONFIG.title;
titleEl.querySelector('p').textContent=CONFIG.subtitle;
const flashEl=document.getElementById('flash');
function setOverlay(t){
  // Title card spans the first beat, whatever it is called or how long it runs.
  const T=BEAT[BEATS[0].name];
  // Fade OUT completes at the beat boundary, not centred on it: a beat's content
  // stays inside its own beat, so retiming the title never bleeds into the next.
  titleEl.style.opacity=(ss(t,T.t0+.2,T.t0+.8)*(1-ss(t,T.t1-.6,T.t1))).toFixed(3);

  // Captions ARE beats — no parallel list to drift out of sync. The fade is
  // inset from each beat edge, which is what used to be a hand-kept gap.
  const F=CONFIG.capFade;
  let txt="",op=0;
  for(const b of BEATS){
    if(!b.cap)continue;
    const B=BEAT[b.name];
    if(t>=B.t0&&t<=B.t1){txt=b.cap;op=ss(t,B.t0,B.t0+F)*(1-ss(t,B.t1-F,B.t1));break;}
  }
  if(txt)capEl.textContent=txt;
  capEl.style.opacity=op.toFixed(3);

  // Flashes anchor to beats too: {beat,at} instead of a bare timestamp.
  let f=0;for(const m of CONFIG.flashes){const c=beatAt(m.beat,m.at||0);f=Math.max(f,bump(t,c-.25,c+.25));}
  flashEl.style.opacity=(f*.98).toFixed(3);
}

/* ---------- driver (the recorder contract) ---------- */
window.DURATION=TOTAL;                                 // derived from BEATS, cannot disagree
// Exposing the beats table lets external tooling label frames by beat and check caption timing
// without re-parsing scene source. Read by sheet and motion build commands and caption lints in smoke.js.
window.BEATS=BEATS;
window.seekTo=function(t){t=clamp(t,0,TOTAL);setCamera(t);animate(t);setOverlay(t);composer.render();};
let playing=true,t0=null;
function loop(now){if(!playing)return;if(t0===null)t0=now;window.seekTo(((now-t0)/1000)%TOTAL);requestAnimationFrame(loop);}
window.stopPlayback=function(){playing=false;};
window.sceneReady=true;
if(!location.search.includes('record'))requestAnimationFrame(loop);else window.seekTo(0);
</script>
