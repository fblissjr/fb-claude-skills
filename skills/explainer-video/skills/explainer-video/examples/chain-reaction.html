<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>One push</title>
<style>
  /* Overlay text lives in the DOM, not the canvas: it stays crisp in screenshots
     and restyles without touching the scene. Colors/fonts come from CONFIG below. */
  :root{--fx:0px;--fy:0px;--fw:1920px;--fh:1080px;}
  html,body{margin:0;padding:0;overflow:hidden;background:#0e0b14;width:100%;height:100%;}
  #c{display:block;width:100vw;height:100vh;}
  #cap{position:fixed;left:calc(var(--fx) + var(--fw)/2);bottom:calc(var(--fy) + var(--fh)*.055);transform:translateX(-50%);
    font:600 calc(var(--fw)*.015625)/1.3 "Avenir Next","Segoe UI",system-ui,sans-serif;
    color:#fff;background:rgba(20,14,30,.62);padding:calc(var(--fw)*.00729167) calc(var(--fw)*.01770833);border-radius:999px;
    white-space:nowrap;opacity:0;border:1px solid rgba(255,255,255,.18);
    text-shadow:0 2px 8px rgba(0,0,0,.5);}
  #title{position:fixed;left:calc(var(--fx) + var(--fw)/2);top:calc(var(--fy) + var(--fh)*.07);transform:translateX(-50%);text-align:center;
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;color:#fff;opacity:0;}
  #title h1{font-size:calc(var(--fw)*.02291667);margin:0;font-weight:800;text-shadow:0 3px 14px rgba(0,0,0,.55);}
  #title p{font-size:calc(var(--fw)*.0125);margin:calc(var(--fw)*.003125) 0 0;font-weight:500;opacity:.9;}
  /* will-change pins these as compositor layers. Without it Chrome re-rasterizes
     the text with a different AA mode after opacity round-trips through 0, so the
     same t can differ by a few pixels depending on seek ORDER -- which breaks the
     frames-shot-in-any-order guarantee for any frame containing overlay text. */
  #cap,#title{will-change:opacity;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;}
  #vig{position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(10,6,18,.42) 100%);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="title"><h1></h1><p></p></div>
<div id="cap"></div>
<div id="flash"></div>

const STYLE = {
  bg: 0x121c26,
  exposure: 1.05,                     // if the scene looks washed out, LOWER this first
  bench: 0xb07f56,
  benchDark: 0x8a5f3c,
  metal: 0x99a5b3,
  dom:  [0xe0533d,0xe4713c,0xe8a03c,0xd8c246,0x8fc25a,0x4bb3a0,0x3f86c4],
  ball: 0xf2f4f8,
  flag: 0xffd23f,
};

/* ---------- CONFIG: everything that is neither timing nor look. ---------- */
const CONFIG = {
  title: "One Push",
  subtitle: "a chain reaction, link by link",
  flashes: [],                        // world-cut flashes, as {beat, at} — e.g. [{beat:'two', at:0}]
  seed: 20260721,                     // change to reshuffle all seeded randomness
  sway: 0.06,                         // idle camera drift. Set to 0 for `build.js loop`:
                                      // sway moves every pixel every frame, which defeats
                                      // WebP/GIF inter-frame compression and can 10x the
                                      // file size. Free in mp4, expensive inline.
  capFade: 0.35,                      // caption fade inset from each beat edge, seconds
  energy: 'steadicam',                // camera nerves: 'locked' | 'steadicam' | 'handheld'
};

/* ---------- FRAME: the one declared reference frame ----------
   Everything composes and measures against this and nothing else. `aspect` is
   the design frame the scene is authored for; `px` is what shoot.js renders at
   (it reads window.FRAME.px, so changing this here is the ONLY edit needed to
   ship 9:16 vertical or 1:1 square -- the tooling follows).

   Before this existed the skill measured against ten different implicit frames:
   the canvas scaled by window height, captions sized in fixed CSS px against
   the window, the shot ladder against frame height, smoke's overflow check
   against a hardcoded 1920. They disagreed the moment a window was not 16:9. */
const FRAME = { aspect: 16/9, px: [1920, 1080] };

/* ==== KERNEL-START ====================================================
   The shared kit. This block is byte-identical in every scene template —
   smoke.js FAILS the run if two checked files carry different kernels.
   Edit it in ALL templates or in none; it is the seed of a future
   extracted kernel file, kept inline so scenes stay single-file.
   ======================================================================= */
/* ---------- deterministic kit ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const rng=mulberry32(CONFIG.seed);
const R=[];for(let i=0;i<4000;i++)R.push(rng());     // frozen random pool — index it, never re-draw
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,u)=>a+(b-a)*u;
// Zero-width span would be 0/0 -> NaN, which propagates silently into a
// position (mesh vanishes) or an opacity string. Guard rather than poison.
const ss=(t,t0,t1)=>{if(t1===t0)return t>=t0?1:0;const u=clamp((t-t0)/(t1-t0),0,1);return u*u*(3-2*u);};   // smooth 0→1
// bump() is rise-AND-FALL: it is 0 at BOTH ends and peaks in the middle. Correct
// for "flash and go"; wrong for "grow and stay" — a burst scaled by bump(u,0,1)
// shrinks back to nothing exactly when it should be at full size, which shipped
// once. Use ss() when the effect should arrive and remain.
const bump=(t,t0,t1)=>{if(t1===t0)return 0;const u=clamp((t-t0)/(t1-t0),0,1);return Math.sin(u*Math.PI);}; // rise+fall

/* ---------- easing personalities (still pure functions) ----------
   ss() is the neutral register. These are the other temperaments a style can
   speak in — all closed forms, all safe anywhere a 0..1 u is in hand:
   compose them with the beat addressing below, e.g. backOut(ramp(t,'one',0,.4)).
   backOut(u)    : arrives with ~10% overshoot, then settles. Snappy, cartoonish.
   elasticOut(u) : overshoots and rings down. Bigger personality than backOut —
                   budget it for payoffs; EVERY arrival ringing reads as jelly.
   quant(t,n)    : stop-motion. Quantize TIME before deriving a pose (n poses
                   per second) and motion reads hand-made. Still deterministic —
                   the quantized t is a pure function of t. Quantize per-object,
                   never inside seekTo itself.
   noise1(t,f,k) : seeded 1-D value noise in [-0.5,0.5] at frequency f Hz, from
                   the frozen R pool. Same k = same track, different k =
                   independent track. Handheld/idle wobble; keep amplitudes small.
   GATE ON THE RAW RAMP u, NEVER ON AN EASED VALUE: backOut(0) carries positive
   floating-point residue (~2e-16), so `if(eased<=0)` leaks one frame where
   scaled geometry is invisible but anything unscaled beside it renders. */
const backOut=(u,s=1.70158)=>{u=clamp(u,0,1);const v=u-1;return 1+(s+1)*v*v*v+s*v*v;};
const elasticOut=(u,p=.3)=>{u=clamp(u,0,1);return u===0||u===1?u:Math.pow(2,-10*u)*Math.sin((u-p/4)*(2*Math.PI)/p)+1;};
const quant=(t,n)=>Math.floor(t*n)/n;
const noise1=(t,f=1,k=0)=>{const x=t*f,i=Math.floor(x),u=x-i,
  g=j=>R[((j%R.length)+R.length)%R.length]-.5,s=u*u*(3-2*u);
  return g(i+k*997)+(g(i+1+k*997)-g(i+k*997))*s;};

/* ---------- beat addressing (use these, never raw timestamps) ----------
   Resolve durations into absolute spans once, then address them by name.
   The a/b arguments are FRACTIONS of the beat, not seconds, so an effect
   keeps its place when the beat is retimed — which is also what lets
   narration-driven timing rewrite durations without breaking animate(). */
const BEAT={};{let acc=0;for(const b of BEATS){BEAT[b.name]={...b,t0:acc,t1:acc+b.dur};acc+=b.dur;}}
const TOTAL=BEATS.reduce((s,b)=>s+b.dur,0);
function beat(name){const B=BEAT[name];if(!B)throw new Error('unknown beat: '+name);return B;}
function span(name,a=0,b=1){const B=beat(name);return[B.t0+a*B.dur,B.t0+b*B.dur];}
const ramp =(t,name,a=0,b=1)=>{const[x,y]=span(name,a,b);return ss(t,x,y);};    // 0→1 ramp
const pulse=(t,name,a=0,b=1)=>{const[x,y]=span(name,a,b);return bump(t,x,y);};  // rise+fall
// during() is a hard boolean at the beat edges, so any expression gated by it MUST be zero at both edges
// or it steps discontinuously in one frame and reads as a pop. Safe use: toggling .visible on something
// with scale already reaching 0. Adding a nonzero offset to a rotation inside if(during(...)) is the exact
// shape that produced a visible 20-degree arm snap in a real scene. Reach for ramp() or pulse() first.
const during=(t,name)=>t>=beat(name).t0&&t<beat(name).t1;
const beatAt=(name,at=0)=>span(name,at,at)[0];                                  // absolute t

/* Seconds-from-beat-start variants. Use these when a duration is PHYSICAL and
   must not stretch when the beat is retimed: a 0.25s flash, a 0.06s world cut,
   a fixed settle time. Stretching a cut window with its beat would uncover the
   cut — which is the one bug method.md says already cost a re-render. Fractions
   for "across this part of the beat", seconds for "this many seconds". */
const secAt  =(name,s=0)=>beat(name).t0+s;
const rampS  =(t,name,s0,s1)=>ss(t,secAt(name,s0),secAt(name,s1));
const pulseS =(t,name,s0,s1)=>bump(t,secAt(name,s0),secAt(name,s1));

/* ---------- the frame rect: composition and overlays share one basis ----------
   The largest FRAME.aspect rect inside the viewport, centred -- which is exactly
   the region the contained scene fills, on both backends. Publishing it as CSS
   vars puts the DOM overlays in the SAME coordinate system as the geometry, so a
   caption is a fixed fraction of the frame instead of a fixed number of window
   pixels. Identity at the design aspect; the vars simply track the frame. */
function frameRect(){
  const W=innerWidth,H=innerHeight;
  const w=Math.min(W,H*FRAME.aspect),h=w/FRAME.aspect;
  return{x:(W-w)/2,y:(H-h)/2,w,h};
}
function applyFrameVars(){
  const r=frameRect(),s=document.documentElement.style;
  s.setProperty('--fx',r.x+'px');s.setProperty('--fy',r.y+'px');
  s.setProperty('--fw',r.w+'px');s.setProperty('--fh',r.h+'px');
}

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(1);                            // fixed DPR = identical pixels everywhere

/* ---------- shared helpers ---------- */
const S=(r,w=24,h=16)=>new THREE.SphereGeometry(r,w,h);
const B=(x,y,z)=>new THREE.BoxGeometry(x,y,z);
const C=(rt,rb,h,s=20)=>new THREE.CylinderGeometry(rt,rb,h,s);
function mesh(g,m,parent,px=0,py=0,pz=0){const o=new THREE.Mesh(g,m);o.position.set(px,py,pz);o.castShadow=true;o.receiveShadow=true;if(parent)parent.add(o);return o;}
function std(color,opts={}){return new THREE.MeshStandardMaterial(Object.assign({color,roughness:.7},opts));}

/* ---------- lights (a sane default rig; tune per scene) ---------- */
scene.add(new THREE.HemisphereLight(0xcfe4ff,0x8a6a52,.6));
const key=new THREE.DirectionalLight(0xfff1dd,1.3);
key.position.set(6,12,8);key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-12;key.shadow.camera.right=12;key.shadow.camera.top=12;key.shadow.camera.bottom=-12;
scene.add(key);
const fill=new THREE.DirectionalLight(0xbfd4ff,.4);fill.position.set(-6,6,-4);scene.add(fill);

/* ============================================================
   WORLDS — replace this placeholder with your scene.
   Pattern: one Group per world, offset far apart (e.g. y -60),
   toggle .visible in animate(t), cut the camera under a flash.
   ============================================================ */
/* ============================================================
   THE MACHINE — every constant below is a LENGTH or an ANGLE.
   Nothing here is a timestamp; the four physical DURATIONS are
   grouped separately and go through secAt(), which is what the
   seconds-variants exist for.
   ============================================================ */
const BALL_R=.80;   // squint strip round 2: at .55 the ball had no silhouette at 90px
/* The ball's CENTRE path: a steep ramp, then two shallower run-out segments.
   The first cut ran straight ramp -> plank and put a 40 degrees direction change
   into one frame at the lip, with nothing under the ball on the run-out. The
   chute below is built FROM this polyline, so the support and the path cannot
   disagree. */
const CHUTE=[[-17.2,9.15],[-12.4,3.60],[-11.2,2.95],[-10.2,2.575]];
const PAN_X=-10.2;                                    // where it settles on the plank
const PIV=[-6.6,1.6,0], PLK_L=8.0, PLK_T=.35, PLK_D=1.7, TH_P=.30;
const HPIV=[-0.4,5.0,0], HARM=3.46, HR=.62, HA_STRIKE=.317;
const NDOM=7, DGAP=1.45, DH=2.2, DTH=.34, DDP=1.3, DX0=1.4;
const TH_LEAN=.66;          // a block stops here, resting on its neighbour
/* The last block leans on the WHEEL, and TH_LAST is solved, not chosen: it is
   the angle at which the block's tip (radius DH about its own base) meets the
   circle the paddle tips sweep. Before this was solved the block swept THROUGH
   the wheel between two paddles and the payoff link read as adjacent rather
   than causal -- visible only in a strip, not in the contact sheet. */
const _bx=DX0+(NDOM-1)*DGAP-DTH/2;
const TH_C=.60;             // contact angle: DH*sin(TH_C) == the face-to-face gap
const WAX=[11.9,2.4,0], WR=1.6, NPAD=6;
const _d=Math.hypot(WAX[0]-_bx,WAX[1]);
const _a=(_d*_d+DH*DH-WR*WR)/(2*_d), _h=Math.sqrt(Math.max(0,DH*DH-_a*_a));
const _ux=(WAX[0]-_bx)/_d,_uy=WAX[1]/_d;
const HITX=_bx+_a*_ux+_h*_uy, HITY=_a*_uy-_h*_ux;     // block tip meets paddle tip here
const TH_LAST=Math.asin(clamp((HITX-_bx)/DH,-1,1));   // ...so the block stops there
const TH_KICK=TH_LAST;
const W_PHASE=Math.atan2(HITY-WAX[1],HITX-WAX[0]);    // park a paddle on the contact point
const POLE_X=13.9, POLE_TOP=6.4, FLAG_Y0=.95, TH_FULL=17.0;
const W_OM0=14.0, W_K=.70;  // rad/s at the kick, and the coast-down rate

/* ---------- the four physical durations, in seconds ---------- */
const ROLL_S=2.10;          // ball: ramp top to the plank
const PLK_S=3.40;           // plank: loaded to settled
const REL_U=.94;            // the head slips off at this fraction of the PLANK'S own travel
const SWING_S=.50;          // hammer: free swing to the strike
const FALL_T=.30, FALL_P=1.7;   // a block's fall: angle ~ tau^1.7 (accelerating)

/* ---------- geometry helpers the chain is derived through ---------- */
const plkTilt   = u => TH_P*ss(u,0,1);
// The plank's raised END CORNER — the point the hammer head actually rests on.
const plkCorner = th => [PIV[0]+(PLK_L/2)*Math.cos(th),
                         PIV[1]+(PLK_L/2)*Math.sin(th)+(PLK_T/2)/Math.cos(th)];
/* Where does a head of radius HR, hanging on an arm of length HARM from HPIV,
   sit when it is resting against that corner? Circle-circle intersection —
   closed form, and it is the honest statement of "the head is ON the plank".
   The first cut of this scene set the head's HEIGHT from the plank end and let
   its X fall wherever the arc put it; the contact sheet showed the head
   floating clear of the plank by ~0.6 units. Deriving the position instead of
   one coordinate of it is the difference between coupled and merely correlated. */
function hamOnCorner(th){
  const [cx,cy]=plkCorner(th);
  const dx=cx-HPIV[0],dy=cy-HPIV[1],d=Math.hypot(dx,dy);
  const a=(d*d+HARM*HARM-HR*HR)/(2*d);
  const h=Math.sqrt(Math.max(0,HARM*HARM-a*a));
  const ux=dx/d,uy=dy/d;
  // Two solutions; take the one further BACK (smaller x) — the head is cocked
  // against the corner, not sitting in front of it.
  const px=HPIV[0]+a*ux+h*uy, py=HPIV[1]+a*uy-h*ux;
  return Math.atan2(px-HPIV[0],HPIV[1]-py);
}
const HA_REST   = hamOnCorner(0);                                // parked on the level plank
const HA_LIFTED = hamOnCorner(plkTilt(REL_U));                   // ...and where the plank leaves it
const HOM       = Math.acos(clamp(HA_STRIKE/HA_LIFTED,-1,1))/SWING_S;  // pendulum rate
// LAG is DERIVED, not chosen: the time a block needs to reach the angle at
// which it touches the next one. Solve tau from TH_C = TH_LEAN*(tau/T)^P.
const LAG=FALL_T*Math.pow(TH_C/TH_LEAN,1/FALL_P);

/* ---------- THE CHAIN OF LATCHES ----------
   One expression rooted in a single beat-relative moment. Every later moment
   is the previous link's OWN curve evaluated at its handover point — no second
   timestamp is ever written down. This is the shape that makes the chain
   irreversible: a latch is monotone in t, so a block that has fallen stays
   fallen even when the thing that pushed it moves back (see b3_spike_geomchain,
   where deriving the angle straight from the pusher's position let the whole
   row stand back up during the hammer's rebound). */
const BALL_T0 = secAt('roll',.30);          // the one authored moment: the ball is let go
const BALL_T1 = BALL_T0 + ROLL_S;           // ...reaches the plank
const PLK_T0  = BALL_T1 + .30;              // the plank takes the load
const REL_T   = PLK_T0 + PLK_S*REL_U;       // the plank's rise lets the head slip
const STRIKE_T= REL_T + SWING_S;            // the hammer arrives at block 0
const DOM_T   = i => STRIKE_T + i*LAG;      // each block hands on at its contact angle
const KICK_T  = DOM_T(NDOM-1) + FALL_T*Math.pow(TH_KICK/TH_LAST,1/FALL_P);

/* ---------- per-link closed forms (pure functions of t) ---------- */
function ballU(t){return clamp((t-BALL_T0)/ROLL_S,0,1);}
function plankTilt(t){return plkTilt(clamp((t-PLK_T0)/PLK_S,0,1));}
function hammerAngle(t){
  if(t<REL_T)return hamOnCorner(plankTilt(t));         // riding the plank corner: pure geometry
  const tau=t-REL_T;
  if(tau<SWING_S)return HA_LIFTED*Math.cos(HOM*tau);   // free pendulum from rest
  const x=tau-SWING_S;                                  // impact ringdown, 0 at x=0
  return HA_STRIKE-.15*Math.exp(-5.5*x)*Math.sin(11*x);
}
function domU(t,i){return clamp((t-DOM_T(i))/FALL_T,0,1);}
function domAngle(t,i){return (i===NDOM-1?TH_LAST:TH_LEAN)*Math.pow(domU(t,i),FALL_P);}
// Coast-down in CLOSED FORM. omega = OM0*exp(-k*tau); theta is its analytic
// integral, so the wheel is never integrated frame to frame and seekTo stays pure.
function wheelTau(t){return Math.max(0,t-KICK_T);}
function wheelTheta(t){const x=wheelTau(t);return W_OM0/W_K*(1-Math.exp(-W_K*x));}
function flagY(t){return FLAG_Y0+ (POLE_TOP-1.4-FLAG_Y0)*clamp(wheelTheta(t)/TH_FULL,0,1);}
// Where the wave is, for the camera to track. Sum of progress = smooth, monotone.
function frontX(t){let f=0;for(let i=0;i<NDOM;i++)f+=domU(t,i);return DX0+clamp(f-.6,0,NDOM-1)*DGAP;}
// Ball centre: two ramp segments, then it rides the plank it just loaded.
const CHUTE_D=CHUTE.slice(1).map((p,i)=>Math.hypot(p[0]-CHUTE[i][0],p[1]-CHUTE[i][1]));
const CHUTE_L=CHUTE_D.reduce((a,b)=>a+b,0);
function ballPos(t){
  // Gravity, not a constant crawl: distance ~ tau^1.55 means the ball leaves at
  // rest and arrives fast, and the hard stop at the far end is the impact with
  // the plank's lip -- a motivated discontinuity, not a pop.
  const u=Math.pow(ballU(t),1.55);
  let L=u*CHUTE_L,x=CHUTE[0][0],y=CHUTE[0][1];
  for(let i=0;i<CHUTE_D.length;i++){
    const d=CHUTE_D[i];
    if(L<=d||i===CHUTE_D.length-1){const f=clamp(L/d,0,1);
      x=lerp(CHUTE[i][0],CHUTE[i+1][0],f);y=lerp(CHUTE[i][1],CHUTE[i+1][1],f);break;}
    L-=d;
  }
  // Once landed, the ball sits on the plank surface and RIDES it down — so the
  // ball drives the plank's onset and the plank then carries the ball. Both
  // halves of the coupling are on screen.
  const th=plankTilt(t);
  const onPlank=PIV[1]+(PAN_X-PIV[0])*Math.sin(th)+PLK_T/2+BALL_R;
  const land=ss(t,BALL_T1-.12,BALL_T1+.10);
  return[lerp(x,PAN_X,land),lerp(y,onPlank,land),0,CHUTE_L*u];
}

let dom=[],hamPiv,ballM,plank,wheel,flagM,cordM;
function buildWorlds(){
  const world=new THREE.Group();scene.add(world);
  // A bench, not an infinite plane: the edge gives the frame a horizon that is
  // part of the object rather than a seam between two flat fields.
  const bench=mesh(B(38,1.0,11),std(STYLE.bench,{roughness:.92}),world,-2.0,-.5,0);
  bench.castShadow=false;
  mesh(B(38,.28,.5),std(STYLE.benchDark,{roughness:.95}),world,-2.0,-.02,5.4);
  // The chute is built FROM the ball's own path, one slab per segment, so the
  // support and the trajectory cannot drift apart.
  CHUTE.slice(1).forEach((p,i)=>{
    const q=CHUTE[i],L=Math.hypot(p[0]-q[0],p[1]-q[1]);
    const sl=mesh(B(L+.9,.4,2.9),std(STYLE.benchDark,{roughness:.8}),world,
      (p[0]+q[0])/2,(p[1]+q[1])/2-BALL_R-.2,0);
    sl.rotation.z=Math.atan2(p[1]-q[1],p[0]-q[0]);
  });
  mesh(B(.5,CHUTE[0][1]-BALL_R,.5),std(STYLE.metal,{roughness:.6}),world,CHUTE[0][0]+.2,(CHUTE[0][1]-BALL_R)/2,0);
  mesh(B(2.9,.5,2.9),std(STYLE.benchDark,{roughness:.9}),world,CHUTE[0][0]+.2,.25,0);
  mesh(B(1.0,1.6,2.9),std(STYLE.benchDark,{roughness:.9}),world,-11.6,.8,0);   // run-out support
  ballM=mesh(S(BALL_R,28,20),std(STYLE.ball,{roughness:.22,metalness:.15}),world);
  // Seesaw: a wedge fulcrum and a plank pivoted on it.
  mesh(C(.25,1.5,PIV[1],4),std(STYLE.benchDark,{roughness:.9}),world,PIV[0],PIV[1]/2,0);
  plank=new THREE.Group();plank.position.set(PIV[0],PIV[1],PIV[2]);world.add(plank);
  mesh(B(PLK_L,PLK_T,PLK_D),std(0xd9a441,{roughness:.6}),plank,0,0,0);
  mesh(B(.3,.9,PLK_D),std(0xd9a441,{roughness:.6}),plank,-PLK_L/2+.15,.45,0);   // a lip to catch the ball
  // Hammer on its post.
  mesh(C(.22,.28,HPIV[1],14),std(STYLE.metal,{roughness:.6}),world,HPIV[0],HPIV[1]/2,0);
  hamPiv=new THREE.Group();hamPiv.position.set(HPIV[0],HPIV[1],HPIV[2]);world.add(hamPiv);
  mesh(C(.1,.1,HARM,12),std(STYLE.metal,{roughness:.4,metalness:.5}),hamPiv,0,-HARM/2,0);
  mesh(S(HR),std(0xdfe5ee,{roughness:.28,metalness:.6}),hamPiv,0,-HARM,0);
  // The row.
  for(let i=0;i<NDOM;i++){
    const g=new THREE.Group();
    g.position.set(DX0+i*DGAP-DTH/2,0,0);
    mesh(B(DTH,DH,DDP),std(STYLE.dom[i],{roughness:.45}),g,DTH/2,DH/2,0);
    world.add(g);dom.push(g);
  }
  // Winch wheel + paddles.
  // Two legs, clear of z=0: the last block's tip sweeps through this x, and a
  // centred post would be speared by it.
  [-1.05,1.05].forEach(z=>mesh(C(.16,.2,WAX[1],10),std(STYLE.metal,{roughness:.6}),world,WAX[0],WAX[1]/2,z));
  wheel=new THREE.Group();wheel.position.set(WAX[0],WAX[1],WAX[2]);world.add(wheel);
  const hub=mesh(C(.42,.42,.7,20),std(STYLE.metal,{roughness:.35,metalness:.5}),wheel,0,0,0);
  hub.rotation.x=Math.PI/2;
  for(let i=0;i<NPAD;i++){
    const a=i*Math.PI*2/NPAD;
    const p=mesh(B(WR,.30,1.0),std(i%2?0x4bb3a0:0xe8a03c,{roughness:.45}),wheel,
      Math.cos(a)*WR/2,Math.sin(a)*WR/2,0);
    p.rotation.z=a;
  }
  // Flag pole, pulley, cord, flag.
  mesh(C(.14,.14,POLE_TOP,12),std(STYLE.metal,{roughness:.6}),world,POLE_X,POLE_TOP/2,0);
  mesh(S(.24,16,12),std(STYLE.metal,{roughness:.4,metalness:.5}),world,POLE_X,POLE_TOP,0);
  cordM=mesh(C(.05,.05,1,8),std(0x22262c,{roughness:.9}),world,POLE_X,0,0);
  // The drive cord: wheel hub -> pulley. Without a visible line between them a
  // flag rising next to a spinning wheel is co-occurrence, not causation.
  {const dx=POLE_X-WAX[0],dy=POLE_TOP-WAX[1],L=Math.hypot(dx,dy);
   const c=mesh(C(.05,.05,L,8),std(0x22262c,{roughness:.9}),world,
     (POLE_X+WAX[0])/2,(POLE_TOP+WAX[1])/2,0);
   c.rotation.z=Math.atan2(-dx,dy);}
  flagM=new THREE.Group();world.add(flagM);
  mesh(B(2.3,1.3,.12),std(STYLE.flag,{roughness:.5}),flagM,1.25,0,0);
  mesh(S(.16,12,10),std(STYLE.metal,{roughness:.5}),flagM,0,0,0);
}
buildWorlds();

/* ============================================================
   CINEMATOGRAPHY — shots as data, solved per frame.

   SUBJECTS names the things a camera can frame. pos is a pure
   function of t returning the subject's CENTER, so a moving
   subject is a tracking shot for free. h is the height the
   framing math uses. Craft note: track a subject's TRAVEL, not
   its jumps — leave vertical action out of pos so it moves in
   the frame instead of being cancelled by the camera.

   SHOTS is the film's shot list — the cinematographer's half of
   the film, the way BEATS is the editor's. Each shot starts at
   a beat anchor and runs until the next shot starts:
     subject  what the shot frames (a SUBJECTS key)
     size     EWS WS FS MS MCU CU ECU — fraction of frame height
              the subject occupies (see SIZES)
     angle    degrees around the subject, 0 = from +Z
     elev     degrees above level (default 6)
     fov      this shot's lens (vertical degrees, default 42) —
              long lens flattens, short lens dramatizes
     size2 / angle2   optional end values: a push/pull or an
              orbit eased across the shot's duration
     focus    subject the DoF plane sits on (default: subject).
              Scenes with a BokehPass read shotFocus each frame;
              two adjacent shots differing only in focus, joined
              by cut:'blend', ARE a rack focus.
     cut      how the shot ENTERS: 'hard' (default), 'whip'
              (0.16s snap), 'blend' (0.8s dolly-morph)
     match    true = must enter with the SAME framing vocabulary
              (size/angle/elev/fov) as the previous shot — the
              match-cut constraint, checked at load, throws loud.
   Raw keyframes are gone on purpose: coordinates were never the
   author's intent, framing was. If a shot the vocabulary cannot
   say is genuinely needed, extend the vocabulary — do not sneak
   coordinates back in.
   ============================================================ */
const SUBJECTS={
  // Wide subjects declare w, so the ladder binds on whichever axis is tighter.
  all:  {pos:t=>[-1.4,3.7,0],h:8.8,w:37},
  ball: {pos:t=>{const b=ballPos(t);return[b[0]-.4,b[1]-1.8,0];},h:7.6,w:12.0},
  plank:{pos:t=>[-5.3,2.9,0],h:6.4,w:13.5},
  front:{pos:t=>[frontX(t),1.2,0],h:5.4},
  wheel:{pos:t=>[WAX[0]+1.4,3.2,0],h:7.0,w:8.0},
};
// The size ladder, calibrated to the convention a cinematographer means:
// f = how many frame-heights the subject's full height spans; a = the
// vertical anchor on the subject the camera aims at. FS is full-body tight;
// MS is waist-up — the first cut of this table shipped MS at full-shot
// framing and the rack's second subject fell out of frame.
const SHOTS=[
  {at:['title',0],   subject:'all',   size:'FS', angle:1,  elev:15, angle2:11},       // slow orbit across the machine
  {at:['roll',.02],  subject:'ball',  size:'WS', angle:22, elev:11, cut:'blend'},    // rides the ball down
  {at:['tip',.02],   subject:'plank', size:'WS', angle:15, elev:9,  cut:'blend'},
  {at:['topple',.02],subject:'front', size:'WS', angle:12, elev:12, cut:'whip'},     // snap to the row
  {at:['spin',.02],  subject:'wheel', size:'WS', angle:20, elev:10, size2:'FS', cut:'blend'},
].map(sh=>({...sh,t:beatAt(sh.at[0],sh.at[1])}));
SHOTS.forEach((sh,i)=>{sh.t1=i<SHOTS.length-1?SHOTS[i+1].t:TOTAL;});
/* ==== SOLVER-START ====================================================
   The cinematography solver. This block is byte-identical in every 3D scene —
   smoke.js FAILS the run if two checked scenes carry different solvers. It had
   reached SIX copies before this fence existed, which is precisely the drift
   the generalization plan's postmortem said to pre-empt "at a third consumer".
   Edit it in ALL 3D scenes or in none.
   ====================================================================== */
const SIZES={EWS:{f:.20,a:.5},WS:{f:.50,a:.5},FSA:{f:.70,a:.5},FS:{f:.95,a:.5},
             MS:{f:1.6,a:.68},MCU:{f:2.4,a:.78},CU:{f:3.6,a:.84},ECU:{f:6,a:.88}};
const LENS=STYLE.lens||42;
SHOTS.forEach((sh,i)=>{                 // the match-cut constraint — verified, not hoped
  if(!sh.match)return;
  const q=SHOTS[i-1]||{};
  const same=sh.size===q.size&&(sh.angle||0)===(q.angle||0)
    &&(sh.elev===undefined?6:sh.elev)===(q.elev===undefined?6:q.elev)
    &&(sh.fov===undefined?LENS:sh.fov)===(q.fov===undefined?LENS:q.fov)
    &&JSON.stringify(sh.anchor===undefined?null:sh.anchor)===JSON.stringify(q.anchor===undefined?null:q.anchor);
  if(!same)throw new Error('match cut into SHOTS['+i+'] breaks framing: size/angle/elev/fov must equal the previous shot');
});
const CUT_DUR=Object.assign({hard:0,whip:.16,blend:.8},STYLE.cutDur||{});
let shotFocus=12;

/* A shot may name ONE subject or SEVERAL. Several resolves to the union box,
   because every causal beat is two objects and the space between them — and
   hand-authoring a composite subject with an invented centre is exactly the
   "coordinates were never the author's intent" this vocabulary exists to
   abolish. `d` (depth) is optional and defaults to 0, which keeps a subject
   that declares only h/w framed exactly as before. */
function subjectExtent(name,t){
  const names=Array.isArray(name)?name:[name];
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity,z0=Infinity,z1=-Infinity,anyW=false;
  for(const n of names){
    const S=SUBJECTS[n];if(!S)throw new Error('unknown subject: '+n);
    const[cx,cy,cz]=S.pos(t);
    const w=S.w||S.h,h=S.h,d=S.d||0;
    if(S.w)anyW=true;
    x0=Math.min(x0,cx-w/2);x1=Math.max(x1,cx+w/2);
    y0=Math.min(y0,cy-h/2);y1=Math.max(y1,cy+h/2);
    z0=Math.min(z0,cz-d/2);z1=Math.max(z1,cz+d/2);
  }
  return{cx:(x0+x1)/2,cy:(y0+y1)/2,cz:(z0+z1)/2,w:x1-x0,h:y1-y0,d:z1-z0,
         fitW:anyW||names.length>1};
}

function solveShot(sh,t){
  const u=sh.t1>sh.t?ss(t,sh.t,sh.t1):0;
  const A=SIZES[sh.size],B=sh.size2?SIZES[sh.size2]:A;
  if(!A||!B)throw new Error('unknown size: '+(A?sh.size2:sh.size));
  const f=lerp(A.f,B.f,u),anchor=sh.anchor!==undefined?sh.anchor:lerp(A.a,B.a,u);
  const a2=sh.angle2===undefined?(sh.angle||0):sh.angle2;
  const ang=lerp(sh.angle||0,a2,u)*Math.PI/180;
  const elev=(sh.elev===undefined?6:sh.elev)*Math.PI/180;
  const fovd=sh.fov===undefined?LENS:sh.fov;
  const E=subjectExtent(sh.subject,t);
  /* Fit the PROJECTED box when depth is known. A subject's on-screen width
     depends on the camera angle: measured on a real scene, a box that fitted at
     0 and -45 degrees CLIPPED at -26, because an axis-aligned w is non-monotonic
     in angle. With d undeclared the subject is treated as billboarded, which is
     what every pre-existing scene assumed. */
  const wProj=E.d>0?Math.abs(E.w*Math.cos(ang))+Math.abs(E.d*Math.sin(ang)):E.w;
  const dist=Math.max(E.h/f,E.fitW?wProj/(f*FRAME.aspect):0)/(2*Math.tan(fovd*Math.PI/360));
  /* Horizontal aim. The ladder had a vertical anchor and no horizontal one, in
     both backends — which is why framing a named subject put its most important
     feature at the frame edge and authors fell back to framing regions. */
  /* Offset along CAMERA-RIGHT, not world X. Offsetting on world X made anchorX a
     no-op at angle 0/180 flipped and, at angle 90, moved the target straight
     toward the camera — changing focus distance and size instead of panning. */
  const ax=sh.anchorX!==undefined?sh.anchorX:0;
  const rx=Math.cos(ang),rz=-Math.sin(ang);          // camera-right, horizontal
  const aimY=E.cy+(anchor-.5)*E.h;
  const aimX=E.cx+ax*E.w*rx, aimZ=E.cz+ax*E.w*rz;
  /* Floor guard: the solver had no clamps at all and would place the camera
     below the ground plane at low elevation and long distance. Not a fix for
     "camera inside the subject" — that is a LIE about extent, and the extent
     check in smoke.js is what catches it. */
  /* Camera floor is OPT-IN (CONFIG.cameraFloor, world units). It is off by
     default on purpose: clamping y moves the camera off the sphere the solver
     placed it on, so elevation and true distance both change and the declared
     rung stops producing the framing it promises — an author asking for a hero
     low angle would silently get a higher one. A default constant would also
     bake a world scale into a skill whose whole claim is any subject at any
     scale: at h~0.2 (a circuit board, a molecule) every shot would clamp. */
  let py=aimY+Math.sin(elev)*dist;
  if(CONFIG.cameraFloor!==undefined&&CONFIG.cameraFloor!==null)py=Math.max(CONFIG.cameraFloor,py);
  return{p:[E.cx+Math.sin(ang)*Math.cos(elev)*dist,py,E.cz+Math.cos(ang)*Math.cos(elev)*dist],
         l:[aimX,aimY,aimZ],fovd};
}
function focusDist(sh,t,p){const E=subjectExtent(sh.focus||sh.subject,t);
  return Math.hypot(p[0]-E.cx,p[1]-E.cy,p[2]-E.cz);}
const DESIGN_AR=FRAME.aspect;
const fitFov=f=>camera.aspect>=DESIGN_AR?f:
  2*Math.atan(Math.tan(f*Math.PI/360)*DESIGN_AR/camera.aspect)*180/Math.PI;
function setCamera(t){
  let i=0;for(let k=0;k<SHOTS.length;k++)if(t>=SHOTS[k].t)i=k;
  const cur=SHOTS[i],c=solveShot(cur,t);
  let p=c.p,l=c.l,fovd=c.fovd,fd=focusDist(cur,t,c.p);
  const cd=CUT_DUR[cur.cut||'hard'];
  if(i>0&&cd>0&&t<cur.t+cd){                            // entering: whip or dolly-morph
    const u=ss(t,cur.t,cur.t+cd),q=solveShot(SHOTS[i-1],t);
    const mix=(a,b)=>[lerp(a[0],b[0],u),lerp(a[1],b[1],u),lerp(a[2],b[2],u)];
    p=mix(q.p,p);l=mix(q.l,l);fovd=lerp(q.fovd,fovd,u);
    fd=lerp(focusDist(SHOTS[i-1],t,q.p),fd,u);          // focus blends too — the rack
  }
  const en=STYLE.energy||CONFIG.energy||'steadicam';
  const E2={locked:0,steadicam:1,handheld:4}[en]*CONFIG.sway;
  const F=en==='handheld'?1.9:.55;
  camera.position.set(p[0]+noise1(t,F,11)*E2*2,p[1]+noise1(t,F,12)*E2*1.2,p[2]);
  camera.fov=fitFov(fovd);camera.updateProjectionMatrix();
  camera.lookAt(l[0]+noise1(t,F,13)*E2*.8,l[1]+noise1(t,F,14)*E2*.5,l[2]);
  shotFocus=fd;
}
/* ==== SOLVER-END ==== */

/* ============================================================
   ANIMATE — every property a pure function of t.
   Use ss(t, start, end) ramps per beat; never accumulate.
   ============================================================ */
function animate(t){
  const b=ballPos(t);
  ballM.position.set(b[0],b[1],0);
  ballM.rotation.z=-b[3]/BALL_R;                     // rolling comes from DISTANCE, not from t
  plank.rotation.z=plankTilt(t);                     // +z drops the LEFT end (the loaded one)
  hamPiv.rotation.z=hammerAngle(t);                  // arm hangs -Y, so +z swings the head toward +x
  for(let i=0;i<NDOM;i++)dom[i].rotation.z=-domAngle(t,i);
  wheel.rotation.z=W_PHASE+wheelTheta(t);   // the strike is on the lower-right: counter-clockwise
  const fy=flagY(t);
  flagM.position.set(POLE_X,fy,0);
  const cl=Math.max(.02,POLE_TOP-fy);
  cordM.position.set(POLE_X,fy+cl/2,0);cordM.scale.y=cl;
}

/* ---------- overlay (captions, title, flashes) ---------- */
const capEl=document.getElementById('cap');
const titleEl=document.getElementById('title');
titleEl.querySelector('h1').textContent=CONFIG.title;
titleEl.querySelector('p').textContent=CONFIG.subtitle;
const flashEl=document.getElementById('flash');
function setOverlay(t){
  // Title card spans the first beat, whatever it is called or how long it runs.
  const T=BEAT[BEATS[0].name];
  // Fade OUT completes at the beat boundary, not centred on it: a beat's content
  // stays inside its own beat, so retiming the title never bleeds into the next.
  titleEl.style.opacity=(ss(t,T.t0+.2,T.t0+.8)*(1-ss(t,T.t1-.6,T.t1))).toFixed(3);

  // Captions ARE beats — no parallel list to drift out of sync. The fade is
  // inset from each beat edge, which is what used to be a hand-kept gap.
  const F=CONFIG.capFade;
  let txt="",op=0;
  for(const b of BEATS){
    if(!b.cap)continue;
    const B=BEAT[b.name];
    if(t>=B.t0&&t<=B.t1){txt=b.cap;op=ss(t,B.t0,B.t0+F)*(1-ss(t,B.t1-F,B.t1));break;}
  }
  if(txt)capEl.textContent=txt;
  capEl.style.opacity=op.toFixed(3);

  // Flashes anchor to beats too: {beat,at} instead of a bare timestamp.
  let f=0;for(const m of CONFIG.flashes){const c=beatAt(m.beat,m.at||0);f=Math.max(f,bump(t,c-.25,c+.25));}
  flashEl.style.opacity=(f*.98).toFixed(3);
}

/* ---------- driver (the recorder contract) ---------- */
window.DURATION=TOTAL;                                 // derived from BEATS, cannot disagree
// Exposing the beats table lets external tooling label frames by beat and check caption timing
// without re-parsing scene source. Read by sheet and motion build commands and caption lints in smoke.js.
window.BEATS=BEATS;
// The declared frame is part of the contract: shoot.js sizes its viewport from
// FRAME.px and smoke.js measures overlay fit against FRAME.aspect. A scene that
// does not export it renders at the historical 1920x1080 default.
window.FRAME=FRAME;
// Flash midpoints, resolved to absolute seconds. Part of the contract because a
// tool cannot read them otherwise: CONFIG is a `const` in a classic script, so
// it never becomes a window property, and smoke.js's flash-avoidance was
// silently avoiding nothing. Same shape as why window.BEATS exists — when a tool
// is tempted to parse scene internals, the contract is missing an export.
window.FLASHES=(CONFIG.flashes||[]).map(m=>beatAt(m.beat,m.at||0));
window.seekTo=function(t){t=clamp(t,0,TOTAL);setCamera(t);animate(t);setOverlay(t);renderer.render(scene,camera);};
let playing=true,t0=null;
function loop(now){if(!playing)return;if(t0===null)t0=now;window.seekTo(((now-t0)/1000)%TOTAL);requestAnimationFrame(loop);}
window.stopPlayback=function(){playing=false;};
window.sceneReady=true;
if(!location.search.includes('record'))requestAnimationFrame(loop);else window.seekTo(0);
</script>
