<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  [x-cloak] { display: none !important; }
</style>
</head>
<body class="bg-gray-950 text-gray-100 font-mono text-sm min-h-screen" x-data="dashboard()" x-cloak>

<div class="max-w-6xl mx-auto px-4 py-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-lg font-bold text-white">skill dashboard</h1>
      <p class="text-gray-500 text-xs mt-0.5">fb-claude-skills &bull; <span x-text="meta.generated_at"></span></p>
    </div>
    <div class="flex gap-2 text-xs">
      <span class="px-2 py-1 rounded bg-green-900 text-green-300" x-text="summary.passed + ' passed'"></span>
      <span class="px-2 py-1 rounded bg-red-900 text-red-300" x-text="summary.failed + ' failed'"></span>
      <span class="px-2 py-1 rounded bg-gray-800 text-gray-300" x-text="summary.total + ' total'"></span>
    </div>
  </div>

  <!-- Skills section -->
  <h2 class="text-xs uppercase tracking-wide text-gray-500 mb-2">Skills</h2>
  <div class="rounded-lg border border-gray-800 overflow-hidden mb-6">
    <table class="w-full">
      <thead>
        <tr class="bg-gray-900 text-gray-400 text-xs uppercase tracking-wide">
          <th class="px-4 py-3 text-left">skill</th>
          <th class="px-3 py-3 text-center">spec</th>
          <th class="px-3 py-3 text-center">description</th>
          <th class="px-3 py-3 text-left">freshness</th>
          <th class="px-3 py-3 text-left">budget</th>
          <th class="px-3 py-3 text-left">body</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-800">
        <template x-for="skill in skills" :key="skill.name">
          <tr class="hover:bg-gray-900 transition-colors">
            <!-- Name -->
            <td class="px-4 py-3">
              <span class="text-white font-medium" x-text="skill.name"></span>
            </td>
            <!-- Spec compliance -->
            <td class="px-3 py-3 text-center">
              <span :class="checkDot(skill, 'spec compliance')" class="inline-block w-2 h-2 rounded-full"
                    :title="checkDetail(skill, 'spec compliance')"></span>
            </td>
            <!-- Description quality -->
            <td class="px-3 py-3 text-center">
              <span :class="checkDot(skill, 'description quality')" class="inline-block w-2 h-2 rounded-full"
                    :title="checkDetail(skill, 'description quality')"></span>
            </td>
            <!-- Freshness -->
            <td class="px-3 py-3">
              <template x-if="skill.checks['staleness']">
                <span :class="skill.checks['staleness'].passed ? 'text-green-400' : 'text-red-400'"
                      class="text-xs" x-text="skill.checks['staleness'].detail"></span>
              </template>
            </td>
            <!-- Token budget -->
            <td class="px-3 py-3">
              <template x-if="skill.checks['token budget']">
                <div>
                  <div class="flex items-center gap-2">
                    <span :class="skill.checks['token budget'].passed ? 'text-green-400' : 'text-red-400'"
                          class="text-xs font-medium" x-text="formatTokenDetail(skill.checks['token budget'].detail)"></span>
                  </div>
                  <div class="mt-1 h-1 rounded bg-gray-800 w-16">
                    <div :class="budgetBar(skill.checks['token budget'])"
                         class="h-1 rounded transition-all"
                         :style="'width:' + budgetPct(skill.checks['token budget'].detail) + '%'">
                    </div>
                  </div>
                </div>
              </template>
            </td>
            <!-- Body size -->
            <td class="px-3 py-3">
              <template x-if="skill.checks['body size']">
                <span :class="skill.checks['body size'].passed ? 'text-gray-400' : 'text-red-400'"
                      class="text-xs" x-text="skill.checks['body size'].detail"></span>
              </template>
            </td>
          </tr>
        </template>
        <tr x-show="skills.length === 0">
          <td colspan="6" class="px-4 py-8 text-center text-gray-600">no skills found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Plugins section -->
  <h2 class="text-xs uppercase tracking-wide text-gray-500 mb-2">Plugins</h2>
  <div class="rounded-lg border border-gray-800 overflow-hidden mb-6">
    <table class="w-full">
      <thead>
        <tr class="bg-gray-900 text-gray-400 text-xs uppercase tracking-wide">
          <th class="px-4 py-3 text-left">plugin</th>
          <th class="px-3 py-3 text-center">manifest</th>
          <th class="px-3 py-3 text-center">marketplace</th>
          <th class="px-3 py-3 text-center">readme</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-800">
        <template x-for="plugin in plugins" :key="plugin.name">
          <tr class="hover:bg-gray-900 transition-colors">
            <td class="px-4 py-3">
              <span class="text-white font-medium" x-text="plugin.name"></span>
            </td>
            <td class="px-3 py-3 text-center">
              <span :class="checkDot(plugin, 'manifest fields')" class="inline-block w-2 h-2 rounded-full"
                    :title="checkDetail(plugin, 'manifest fields')"></span>
            </td>
            <td class="px-3 py-3 text-center">
              <span :class="checkDot(plugin, 'marketplace listing')" class="inline-block w-2 h-2 rounded-full"
                    :title="checkDetail(plugin, 'marketplace listing')"></span>
            </td>
            <td class="px-3 py-3 text-center">
              <span :class="checkDot(plugin, 'README exists')" class="inline-block w-2 h-2 rounded-full"
                    :title="checkDetail(plugin, 'README exists')"></span>
            </td>
          </tr>
        </template>
        <tr x-show="plugins.length === 0">
          <td colspan="4" class="px-4 py-8 text-center text-gray-600">no plugins found</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Repo hygiene section -->
  <h2 class="text-xs uppercase tracking-wide text-gray-500 mb-2">Repo Hygiene</h2>
  <div class="rounded-lg border border-gray-800 overflow-hidden mb-4">
    <div class="divide-y divide-gray-800">
      <template x-for="item in repo" :key="item.check">
        <div class="flex items-center gap-3 px-4 py-2.5 hover:bg-gray-900 transition-colors">
          <span :class="item.passed ? 'bg-green-400' : 'bg-red-400'" class="w-2 h-2 rounded-full flex-shrink-0"></span>
          <span class="text-gray-300 text-xs" x-text="item.check"></span>
          <span x-show="item.detail" class="text-gray-600 text-xs ml-auto" x-text="item.detail"></span>
        </div>
      </template>
    </div>
  </div>

</div>

<script>
// Dashboard data injected by server
const DASHBOARD_DATA = __DASHBOARD_DATA__;

function dashboard() {
  return {
    skills: DASHBOARD_DATA.skills,
    plugins: DASHBOARD_DATA.plugins,
    repo: DASHBOARD_DATA.repo,
    summary: DASHBOARD_DATA.summary,
    meta: DASHBOARD_DATA.meta,

    checkDot(entity, checkName) {
      const c = entity.checks[checkName];
      if (!c) return 'bg-gray-500';
      return c.passed ? 'bg-green-400' : 'bg-red-400';
    },

    checkDetail(entity, checkName) {
      const c = entity.checks[checkName];
      if (!c) return '';
      return c.passed ? 'OK' : (c.detail || 'FAIL');
    },

    formatTokenDetail(detail) {
      if (!detail) return '';
      const num = parseInt(detail.replace(/,/g, ''));
      if (isNaN(num)) return detail;
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return String(num);
    },

    budgetPct(detail) {
      if (!detail) return 0;
      const num = parseInt(detail.replace(/,/g, ''));
      if (isNaN(num)) return 0;
      return Math.min(100, Math.round(num / this.meta.budget_critical * 100));
    },

    budgetBar(check) {
      if (!check) return 'bg-gray-500';
      const num = parseInt(check.detail.replace(/,/g, ''));
      if (num > this.meta.budget_critical) return 'bg-red-500';
      if (num > this.meta.budget_warn) return 'bg-amber-500';
      return 'bg-green-500';
    },
  };
}
</script>
</body>
</html>
